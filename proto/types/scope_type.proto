syntax = "proto3";

package hs.proto.types;

enum ScopeType {
  SCOPE_TYPE_UNSPECIFIED = 0;
  SCOPE_TYPE_WORLD = 1;
  SCOPE_TYPE_PLANE = 2;
  SCOPE_TYPE_REGION = 4;
  SCOPE_TYPE_CELL = 5;
  SCOPE_TYPE_CIV = 6;
  SCOPE_TYPE_CITY = 7;
  SCOPE_TYPE_IMPROVEMENT = 8;
  SCOPE_TYPE_IMPROVEMENT_CLASS = 11;
  SCOPE_TYPE_ARMY = 9;
  SCOPE_TYPE_UNIT = 10;
  SCOPE_TYPE_UNIT_CLASS = 12;
  SCOPE_TYPE_JOB_CLASS = 13;
  SCOPE_TYPE_JOB = 14;
}

enum ScopeTypeSet {
  SCOPE_TYPE_SET_UNSPECIFIED = 0;
  // Geo-related scopes.
  // Includes SCOPE_TYPE_WORLD, SCOPE_TYPE_PLANE, SCOPE_TYPE_REGION, SCOPE_TYPE_CELL
  SCOPE_TYPE_SET_GEO = 1;
  // Civilization-related scopes. Includes SCOPE_TYPE_CIV, SCOPE_TYPE_CITY,
  // SCOPE_TYPE_IMPROVEMENT, SCOPE_TYPE_IMPROVEMENT_CLASS
  SCOPE_TYPE_SET_CIV = 2;

  // Military-related scopes
  // Includes SCOPE_TYPE_ARMY, SCOPE_TYPE_UNIT, SCOPE_TYPE_UNIT_CLASS
  SCOPE_TYPE_SET_MILLITARY = 3;

  // Everything that can have modifiers for jobs
  // Includes SCOPE_TYPE_SET_GEO и SCOPE_TYPE_SET_CIV
  SCOPE_TYPE_SET_JOBS = 4;
}

// Element matches filter if it matches any element. Meaning everything is joined
// via OR
message ScopeTypeFilter {
  repeated ScopeTypeSet scope_type_sets = 1;
  repeated ScopeType scope_types = 2;
}
