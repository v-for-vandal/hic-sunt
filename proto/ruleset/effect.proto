syntax = "proto3";

package hs.proto.ruleset.effect;

import "l10n/localized_name.proto";
import "types/scope_type.proto";

message Code {
  oneof code {
    string lua = 1;
  }
}

message Selector {
  int32 placeholder = 1;
}

// Effect is executed for every entity that matches the selector.
// Effect requires declaring its target and set of required input variables
// Scheduling affects how effects are executed.
message Effect {

  enum Schedule {
    MANUAL = 0;
    EVERY_TURN = 1;
  }

  string id = 1;
  l10n.LocalizedName name = 2;

  // Scope type that this effect can be used on.
  types.ScopeType target = 3;

  // This field limits what targets to execute this effect on
  Selector selector = 4;

  // When this effect is executed
  Schedule schedule = 6;

  // Predicate to check if effect should be executed
  Code possible = 5;

  // Code to execute
  Code effect = 7;
}

message Effects {
  repeated Effect effects = 1;
}
